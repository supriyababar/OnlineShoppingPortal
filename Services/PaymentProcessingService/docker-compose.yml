version: '3.8'

services:
  payment-processing-service:
    image: payment-processing-service:latest
    container_name: payment-processing-service
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5003
    networks:
      - online-shopping-network

networks:
  online-shopping-network:
    driver: bridge
